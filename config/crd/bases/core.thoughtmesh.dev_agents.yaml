---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: agents.core.thoughtmesh.dev
spec:
  group: core.thoughtmesh.dev
  names:
    kind: Agent
    listKind: AgentList
    plural: agents
    singular: agent
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Agent is the Schema for the agents API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Agent
            properties:
              endingCondition:
                description: EndingCondition defines when the agent should stop
                properties:
                  maxTurns:
                    description: MaxTurns is the maximum number of turns before the
                      agent stops
                    format: int32
                    minimum: 1
                    type: integer
                  natural:
                    description: Natural is an LLM-evaluated natural language stopping
                      condition
                    type: string
                  timeoutSeconds:
                    description: TimeoutSeconds is the maximum time in seconds before
                      the agent stops
                    format: int32
                    minimum: 1
                    type: integer
                type: object
              input:
                description: Input defines the input data for the agent
                properties:
                  path:
                    description: Path is used when type is "file"
                    type: string
                  type:
                    description: Type is either "string" or "file"
                    enum:
                    - string
                    - file
                    type: string
                  value:
                    description: Value is used when type is "string"
                    type: string
                required:
                - type
                type: object
              memory:
                description: Memory is a reference to a Memory resource to attach
                  to this agent
                properties:
                  ref:
                    description: Ref is the name of a Memory resource in the same
                      namespace
                    type: string
                required:
                - ref
                type: object
              objective:
                description: Objective is the high-level goal of the agent
                type: string
              output:
                description: Output defines where the agent should write its result
                properties:
                  path:
                    description: Path is used when type is "file"
                    type: string
                  type:
                    description: Type is either "string" or "file"
                    enum:
                    - string
                    - file
                    type: string
                  value:
                    description: Value is used when type is "string"
                    type: string
                required:
                - type
                type: object
              tasks:
                description: Tasks is the list of tasks the agent should complete
                items:
                  description: Task defines a unit of work for the agent
                  properties:
                    description:
                      description: Description of the task
                      type: string
                    priority:
                      default: 0
                      description: Priority of the task, lower value means higher
                        priority
                      format: int32
                      type: integer
                  required:
                  - description
                  type: object
                type: array
            required:
            - objective
            type: object
          status:
            description: status defines the observed state of Agent
            properties:
              currentTask:
                description: CurrentTask is the description of the task currently
                  being executed
                type: string
              currentTurn:
                description: CurrentTurn is the current agentic loop iteration
                format: int32
                type: integer
              phase:
                description: Phase is the current lifecycle phase of the agent
                enum:
                - Pending
                - Running
                - Paused
                - Succeeded
                - Failed
                type: string
              startTime:
                description: StartTime is when the agent started running
                format: date-time
                type: string
              terminationReason:
                description: TerminationReason explains why the agent stopped
                enum:
                - NaturalConditionMet
                - MaxTurnsReached
                - TimedOut
                - Error
                - Stopped
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
