---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - core.thoughtmesh.dev
  resources:
  - agents
  - agenttemplates
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - core.thoughtmesh.dev
  resources:
  - agents/finalizers
  - agenttemplates/finalizers
  verbs:
  - update
- apiGroups:
  - core.thoughtmesh.dev
  resources:
  - agents/status
  - agenttemplates/status
  verbs:
  - get
  - patch
  - update
