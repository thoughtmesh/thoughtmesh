apiVersion: core.thoughtmesh.dev/v1alpha1
kind: AgentTemplate
metadata:
  labels:
    app.kubernetes.io/name: thoughtmesh
    app.kubernetes.io/managed-by: kustomize
  name: agenttemplate-sample
spec:
  objective: "Summarize all incidents from the last 24 hours"
  keyResults:
    - "Generate a digest with all incidents"
    - "Post summary to notification channel"
  
  model:
    worker:
      provider: anthropic
      apiName: claude-sonnet-4-20250514
      temperature: "0.2"
  
  lifecycle:
    completion:
      onSuccess: retain
      onFailure: retain
